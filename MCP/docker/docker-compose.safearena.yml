# MCP/docker/docker-compose.safearena.yml
#
# SafeArena web services. Run alongside the base docker-compose.yml:
#   cd MCP/docker
#   docker compose -f docker-compose.yml -f docker-compose.safearena.yml up -d

networks:
  sandbox:
    external: false   # defined in base docker-compose.yml

services:
  sa-homepage:
    image: safearena/homepage
    networks: [sandbox]
    ports: ["4399:4399"]
    mem_limit: 256m

  sa-shopping:
    image: safearena/shopping
    networks: [sandbox]
    ports: ["7770:7770"]
    mem_limit: 512m

  sa-shopping-admin:
    image: safearena/shopping-admin
    networks: [sandbox]
    ports: ["7780:7780"]
    mem_limit: 256m

  sa-forum:
    image: safearena/forum
    networks: [sandbox]
    ports: ["9999:9999"]
    mem_limit: 512m

  sa-gitlab:
    image: safearena/gitlab
    networks: [sandbox]
    ports: ["8023:8023"]
    mem_limit: 2g

  sa-reset:
    image: safearena/reset
    networks: [sandbox]
    ports: ["7565:7565"]
    mem_limit: 256m
