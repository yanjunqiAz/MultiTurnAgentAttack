# ============================================================================
# ToolShield Baseline Attack Pipeline Configurations
# ============================================================================
#
# This file defines named configurations for the ToolShield baseline attack
# pipeline (run_baseline_pipeline.py). ToolShield is an existing tool-safety
# framework used as a comparison baseline against STAC-generated attacks.
#
# The pipeline has up to 3 steps, selectable per config:
#   1. generate  — Use ToolShield to generate adversarial tool-use attacks
#                  against SHADE-Arena and/or Agent-SafetyBench (ASB) environments.
#   2. convert   — Convert raw ToolShield output into STAC-compatible format
#                  so it can be evaluated with the same eval harness.
#   3. evaluate  — Run the converted attacks through the STAC adaptive planning
#                  system (Planner -> Agent -> Judge loop) and score results.
#
# Config structure:
#   - _global: Default values inherited by ALL named configs.
#   - Each named config can override any _global field.
#   - Key fields:
#       steps       — Which pipeline steps to run (list subset of [generate, convert, evaluate])
#       dataset     — Target benchmark: "shade", "asb", or "both"
#       model_agent — LLM used as the agent under attack during evaluation
#       model_judge — LLM used as the judge to score attack success
#       defense     — Defense strategy applied to the agent (string or list for sweeps)
#       batch_size  — Concurrent eval batch size (512 for OpenAI, ~10 for Bedrock)
#       input_path  — Path to pre-generated attack data (for evaluate-only configs)
#       shade_env   — Optional: restrict SHADE generation to a specific environment
#
# Usage:
#   python -m Baseline.run_baseline_pipeline --config <name>
#   python -m Baseline.run_baseline_pipeline --list-configs
#   python -m Baseline.run_baseline_pipeline --config shade_gpt41 shade_gpt41_reasoning
#
# _global values are inherited by ALL configs. Per-config values override.
# ============================================================================

# =====================
# Global defaults
# =====================
# These apply to every config. Per-config values take precedence.
# Uncomment and fill in your API keys.

_global:
  env:
    TOOLSHIELD_MODEL_NAME: "gpt-4.1"
    # ANTHROPIC_API_KEY: "your-key"         # for attack generation (Anthropic models)
    # OPENROUTER_API_KEY: "your-key"        # alternative: OpenRouter (any model)
    # AWS_ACCESS_KEY_ID: "..."              # for Bedrock agent models
    # AWS_SECRET_ACCESS_KEY: "..."          # for Bedrock agent models
  model_agent: gpt-4.1
  model_judge: gpt-4.1
  batch_size: 200
  defense: no_defense

# =====================
# Full pipeline configs
# =====================

shade_gpt41:
  description: "SHADE-Arena full pipeline with GPT-4.1 (no defense)"
  steps: [generate, convert, evaluate]
  dataset: shade

shade_gpt41_all_defenses:
  description: "SHADE-Arena: evaluate GPT-4.1 across all defense strategies"
  steps: [generate, convert, evaluate]
  dataset: shade
  defense: [no_defense, failure_modes, summarization, reasoning, spotlighting, toolshield_experience]

asb_gpt41:
  description: "Agent_SafetyBench full pipeline with GPT-4.1 (no defense)"
  steps: [generate, convert, evaluate]
  dataset: asb

both_gpt41:
  description: "Both datasets, GPT-4.1, no defense"
  steps: [generate, convert, evaluate]
  dataset: both

# ==========================
# Evaluate-only configs
# (use pre-generated data)
# ==========================

eval_shade_gpt41:
  description: "Evaluate existing SHADE data with GPT-4.1"
  steps: [evaluate]
  dataset: shade
  input_path: data/toolshield_shade_stac.json

eval_shade_claude:
  description: "Evaluate existing SHADE data with Claude Sonnet 4.5 (Bedrock)"
  steps: [evaluate]
  dataset: shade
  input_path: data/STAC_benchmark_data.json
  model_agent: us.anthropic.claude-sonnet-4-5-v1
  region: us-west-2

eval_all_defenses:
  description: "Evaluate existing data across all defenses with GPT-4.1"
  steps: [evaluate]
  dataset: shade
  input_path: data/toolshield_shade_stac.json
  defense: [no_defense, failure_modes, summarization, reasoning, spotlighting, toolshield_experience]

eval_model_sweep:
  description: "Evaluate existing data across multiple agent models"
  steps: [evaluate]
  dataset: shade
  input_path: data/STAC_benchmark_data.json
  model_agent: [gpt-4.1, gpt-4.1-mini, gpt-4.1-nano]

# ==========================
# Generate-only configs
# ==========================

gen_shade_only:
  description: "Generate SHADE attacks only (no eval)"
  steps: [generate, convert]
  dataset: shade

gen_asb_only:
  description: "Generate ASB attacks only (no eval)"
  steps: [generate, convert]
  dataset: asb

gen_shade_banking:
  description: "Generate attacks for SHADE banking environment only"
  steps: [generate, convert]
  dataset: shade
  shade_env: banking
